services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-streamloyal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-streamloyal}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-streamloyal}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    env_file: ${ENV_FILE:-.env.production}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-streamloyal}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-streamloyal}
    command: pnpm --filter @streamloyal/db exec prisma migrate deploy
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build: .
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.production}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-streamloyal}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-streamloyal}
      REDIS_URL: redis://redis:6379
    command: pnpm --filter web start
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    build: .
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.production}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-streamloyal}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-streamloyal}
      WORKER_HEALTH_PORT: 3001
    command: pnpm --filter bot-worker start
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
